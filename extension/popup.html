<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TripExtract</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    /* Popup-specific sizing */
    html, body { width: 380px; min-height: 120px; max-height: 600px; overflow-y: auto; }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="header-logo">
      <!-- Map pin icon -->
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
      </svg>
    </div>
    <div>
      <div class="header-title">TripExtract</div>
      <div class="header-subtitle">Places from YouTube travel videos</div>
    </div>
  </div>

  <!-- Main content — rendered by popup.js -->
  <div id="app"></div>

  <!-- Toast -->
  <div class="copied-toast" id="toast">Copied!</div>

  <script src="popup.js"></script>
</body>
</html>
